<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Building base -->
  <rect x="4" y="14" width="24" height="16" rx="1" fill="#1e3a5f"/>
  <!-- Roof -->
  <polygon points="2,14 16,4 30,14" fill="#0f172a"/>
  <!-- Antenna -->
  <rect x="15" y="0" width="2" height="6" fill="#94a3b8"/>
  <circle cx="16" cy="0" r="1.5" fill="#22c55e"/>
  <!-- Windows row 1 -->
  <rect x="7" y="17" width="4" height="4" rx="0.5" fill="#60a5fa" opacity="0.8"/>
  <rect x="14" y="17" width="4" height="4" rx="0.5" fill="#60a5fa" opacity="0.8"/>
  <rect x="21" y="17" width="4" height="4" rx="0.5" fill="#fbbf24" opacity="0.9"/>
  <!-- Door -->
  <rect x="13" y="23" width="6" height="7" rx="1" fill="#0f172a"/>
  <circle cx="18" cy="26.5" r="0.7" fill="#94a3b8"/>
  <!-- TCC label -->
  <text x="16" y="13" text-anchor="middle" font-size="2.8" font-family="Arial" font-weight="700" fill="#ffffff">TCC</text>
</svg>
